<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mai Filer</title>
  <script>
    // GitHub Pages SPA redirect — encodes the path into a query param so the
    // main index.html can restore it via history.replaceState.
    // basePath segment count = 1 (/My_filer)
    var seg = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
