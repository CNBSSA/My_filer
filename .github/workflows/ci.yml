name: ci

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

# Cancel older runs on the same ref so fast successive pushes don't
# queue duplicate work.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — FastAPI + Claude orchestrator + tax services.
  #   * pytest (fails on any red test)
  #   * alembic upgrade head against SQLite (proves the migration chain still
  #     applies cleanly on a fresh DB; catches model/migration drift)
  # ---------------------------------------------------------------------------
  backend:
    name: backend (pytest + alembic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run pytest
        run: python -m pytest -q

      - name: Verify alembic migration chain
        env:
          DATABASE_URL: sqlite:///./migration_check.db
        run: |
          alembic upgrade head
          rm -f migration_check.db

  # ---------------------------------------------------------------------------
  # Web — Next.js build + WCAG 2.2 AA accessibility gate.
  #   * npm ci + build (type-check is part of next build)
  #   * test:a11y (jsdom + axe-core; boots its own next start, no browser
  #     download required — keeps the runner lightweight)
  # The Playwright deep-test path (test:a11y:browser) is intentionally NOT
  # part of CI to avoid the Chromium download on every run. Turn it on via
  # a second workflow job if you want browser-level checks on every PR.
  # ---------------------------------------------------------------------------
  web:
    name: web (build + a11y)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-checks included)
        run: npm run build

      - name: Accessibility gate (jsdom + axe-core)
        env:
          A11Y_PORT: '3457'
          A11Y_FAIL_LEVEL: serious
        run: npm run test:a11y
