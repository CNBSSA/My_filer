services:
  postgres:
    image: postgres:16-alpine
    container_name: mai-filer-postgres
    environment:
      POSTGRES_USER: mai
      POSTGRES_PASSWORD: mai
      POSTGRES_DB: mai_filer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mai -d mai_filer"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mai-filer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: mai-filer-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery worker (P6.4/P6.5). Profile-gated so `docker compose up`
  # stays light for dev; opt in with `docker compose --profile async up`
  # once the API image is built. Mirrors the AWS-side layout where the
  # worker runs as a companion ECS service to the API.
  celery-worker:
    profiles: ["async"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: mai-filer-celery-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DATABASE_URL: postgresql+psycopg://mai:mai@postgres:5432/mai_filer
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minio-data:
